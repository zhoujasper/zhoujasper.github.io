[[items]]
title = "英国最佳双人组成绩"
subtitle = "Simon Marais Mathematics Competition"
date = "2025年"
selected = true
content = "我与 Kevin Zhao 搭档，在 2025 年 Simon Marais Mathematics Competition 西赛区中取得英国参赛队伍中的最佳双人组成绩，得分为 21 分。官方结果页将我们列为 United Kingdom 的 Best pairs entry by country。这个奖项对我而言尤其有意义，因为这项竞赛更强调大学层面的创造性、证明型数学解题能力，而不仅仅是常规计算。比赛结果可见[此处](https://www.simonmarais.org/west-division.html)。"
tags = ["奖项", "数学竞赛", "Simon Marais Mathematics Competition", "英国最佳双人组", "国际竞赛", "问题求解", "证明型数学", "爱丁堡大学"]
links = [
    { name = "结果", url = "https://www.simonmarais.org/west-division.html" }
]

[[items]]
title = "项目内前三 / 数学学院年级前5%"
subtitle = "爱丁堡大学"
date = "2025年"
selected = true
content = "在 2024/25 学年爱丁堡大学数学学院学业排名中，我在所在项目内位列第 3（24 人中），在年级中位列第 4（120 人中）。这一成绩体现了我在高阶荣誉数学课程中的持续稳定表现，也使我成为同年级中成绩最突出的学生之一。"
tags = ["奖项", "学业排名", "爱丁堡大学", "数学学院", "项目前三", "年级前5%", "学业优秀", "荣誉数学"]

[[items]]
title = "Kelland Memorial Prize"
subtitle = "爱丁堡大学"
date = "2024年"
selected = true
content = "因以 Direct Entry 方式进入数学专业二年级并取得优异表现而获得 Kelland Memorial Prize。根据爱丁堡大学奖项说明，该奖项由 Board of Examiners 每年评定，授予直接进入二年级学习且表现突出的学生，因此对我而言，这也是对我进入学位课程后学术过渡表现的一项特别认可。官方信息可见[此处](https://registryservices.ed.ac.uk/student-funding/current-students/university-prizes-awards/science-engineering/mathematics)。"
tags = ["奖项", "校级奖项", "Kelland Memorial Prize", "爱丁堡大学", "数学学院", "Direct Entry", "二年级数学", "学业优秀"]
links = [
    { name = "官方信息", url = "https://registryservices.ed.ac.uk/student-funding/current-students/university-prizes-awards/science-engineering/mathematics" }
]

[[items]]
title = "William and Isabella Dick Prize"
subtitle = "爱丁堡大学"
date = "2024年"
selected = true
content = "因在数学专业二年级阶段取得突出成绩而获得 William and Isabella Dick Prize。根据爱丁堡大学官方说明，该奖项每年授予一名或多名二年级数学在读学生中的最佳表现者。获得这一奖项，意味着我在整个二年级课程中的成绩表现得到了正式认可。官方信息可见[此处](https://registryservices.ed.ac.uk/student-funding/current-students/university-prizes-awards/science-engineering/mathematics)。"
tags = ["奖项", "校级奖项", "William and Isabella Dick Prize", "爱丁堡大学", "数学学院", "二年级数学", "学业优秀", "本科数学"]
links = [
    { name = "官方信息", url = "https://registryservices.ed.ac.uk/student-funding/current-students/university-prizes-awards/science-engineering/mathematics" }
]

[[items]]
title = "School of Mathematics Vacation Scholarship"
subtitle = "爱丁堡大学"
date = "2024年"
selected = true
content = "获得爱丁堡大学数学学院 Vacation Scholarship 暑期研究资助。该项目用于支持在数学学院导师指导下开展的暑期数学研究；学校当前页面说明，这类资助通常为期六周、每周 300 英镑，并根据学业表现进行评定。获得这项资助，使我能够在更独立、更具探索性的环境中开展早期数学研究。关于数学学院奖项与奖学金的信息可见[此处](https://registryservices.ed.ac.uk/student-funding/current-students/university-prizes-awards/science-engineering/mathematics)，关于 Vacation Scholarship 的说明可见[此处](https://teaching.maths.ed.ac.uk/undergraduate/opportunities/vacation-scholarships/funding)。"
tags = ["奖项", "奖学金", "Vacation Scholarship", "暑期科研", "研究资助", "爱丁堡大学", "数学学院", "本科科研"]
links = [
    { name = "官方信息", url = "https://registryservices.ed.ac.uk/student-funding/current-students/university-prizes-awards/science-engineering/mathematics" },
    { name = "奖学金说明", url = "https://teaching.maths.ed.ac.uk/undergraduate/opportunities/vacation-scholarships/funding" }
]

[[items]]
title = "Euclid 数学竞赛全球前25%"
subtitle = "Euclid Mathematics Contest"
date = "2023年"
content = "在 Euclid Mathematics Contest 中获得全球前 25% 的成绩。按照竞赛官方奖项设置，这对应于 Certificate of Distinction。该竞赛由滑铁卢大学 Centre for Education in Mathematics and Computing 组织，是最具代表性的国际中学阶段数学竞赛之一，尤其强调严谨的书面解答能力与数学问题求解能力。官方竞赛信息可见[此处](https://cemc.uwaterloo.ca/contests/euclid)。"
tags = ["奖项", "数学竞赛", "Euclid Mathematics Contest", "Certificate of Distinction", "全球前25%", "滑铁卢大学", "问题求解", "中学数学"]
links = [
    { name = "官方信息", url = "https://cemc.uwaterloo.ca/contests/euclid" }
]

