[[items]]
title = "战略性劳动力配置优化"
subtitle = "优化建模项目 · 团队负责人"
date = "2025年4月"
content = "这个项目考虑的是一家咨询公司的多项目劳动力配置问题。目标是在满足岗位限制、差旅成本、闲置政策以及其他业务规则的前提下，将顾问分配到不同项目、地点和职级中，并同时最大化总利润。我使用 Xpress 构建并求解了一个线性/整数优化模型，用于处理跨多个地区的 13 个项目；随后又将分析扩展到更具现实意义的战略情景中，包括需求波动、远程办公惩罚、外包成本以及爱尔兰交通中断。结果表明，例如适度使用远程办公能够显著降低差旅成本，但当远程容量达到项目需求的大约 15% 后，其边际收益会逐渐趋于平缓。项目还表明，在发生扰动时，过度依赖跨区域调配会削弱系统韧性。总体而言，这是一个很好的应用优化项目，展示了数学规划如何支持现实管理决策。"
tags = ["优化", "数学规划", "混合整数线性规划", "MILP", "Xpress", "劳动力规划", "资源配置", "情景分析", "运筹学", "团队负责人"]
links = [
    { name = "报告", url = "/projects/Strategic_Workforce_Allocation_Optimization.pdf" }
]

[[items]]
title = "多阶段笔记本电脑制造系统仿真研究"
subtitle = "制造系统仿真项目 · 团队负责人"
date = "2026年4月"
content = "这个项目使用 Simul8 构建了一个多阶段笔记本电脑制造系统的离散事件仿真模型。我们首先对到达间隔时间和多组加工时间数据进行了输入分析，使用 AIC、BIC、KS 检验和极大似然估计来选择合适的概率模型。随后，我们将阻塞、返工、库存控制、部件匹配以及订单层面的同步机制嵌入到完整仿真框架中。基线模型揭示出系统性能较差，平均循环时间约为 1575 分钟，其中机壳制造线被识别为主要瓶颈。在这些发现基础上，我们设计了一系列渐进式改进实验，进一步揭示了铝材供应、硬盘可用性以及工作台容量等分层瓶颈。最终改进后的模型将平均循环时间降低到约 1242 分钟，吞吐率由每小时 2.82 台提升到 7.14 台，并显著降低了拒绝率。这个项目很好地展示了我在输入建模、系统诊断、实验仿真和运营解释方面的工作。"
tags = ["仿真", "离散事件仿真", "Simul8", "制造系统", "输入建模", "瓶颈分析", "AIC/BIC", "MLE", "运筹学", "团队负责人"]
links = [
    { name = "报告", url = "/projects/Multi-Stage_Laptop_Manufacturing_System_Simulation.pdf" }
