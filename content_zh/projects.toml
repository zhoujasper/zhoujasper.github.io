[[items]]
title = "有理数逼近"
subtitle = "四年级小组项目 · 爱丁堡大学（导师：Jim Wright教授）"
date = "2025年–2026年"
content = "这是我关于丢番图逼近的毕业年纯数学项目。项目围绕一个基本问题展开：实数究竟能被有理数逼近到什么程度？围绕这一问题，报告系统梳理了连分数、刘维尔定理、图厄定理，以及它们与佩尔方程、二元齐次多项式和狄利克雷单位定理之间的联系。这个项目主要是理论性和综述性的：它不仅要求理解单个结果本身，还要求将它们组织成一个具有清晰逻辑推进的连贯数学叙述。在我所有项目中，这个项目最能代表我对纯数学的长期兴趣，尤其是数论及其相邻的代数方向。"
