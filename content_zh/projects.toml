[[items]]
title = "BoxCar 网约车系统仿真研究"
subtitle = "数据驱动离散事件仿真项目 · 团队负责人"
date = "2026年2月"
content = "这个项目通过数据驱动的离散事件仿真研究一个网约车系统的运营表现。我和一位队友共同建立了一个模型，用来刻画乘客到达、司机供给、基于距离的匹配、行程执行，以及与之相关的收入和成本结构。我们首先检验了项目说明中给出的参数值是否与观测数据在统计上一致，并发现默认配置会使系统接近饱和，从而导致更长的等待时间、更高的取消率以及更弱的净收益。随后，我们使用极大似然方法重新估计了关键参数，并将调整后的基线与原始设定进行比较。最后，我们设计了若干情景来分析乘客服务质量、司机收入、盈利能力以及系统平衡之间的权衡。项目的一个核心结论是：单纯增加司机供给并不是改善服务最稳健的方法；更高效的匹配机制和更少的空驶里程，往往才是更可持续的运营改进方向。"
selected = true
tags = ["仿真", "离散事件仿真", "网约车系统", "数据驱动建模", "极大似然估计", "MLE", "服务运营", "情景分析", "收益分析", "团队负责人"]
