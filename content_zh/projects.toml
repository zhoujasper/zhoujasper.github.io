[[items]]
title = "面向数学课程排课的约束规划"
subtitle = "TAOR 期末项目 · 爱丁堡大学 · 团队负责人"
date = "2026年"
content = "这个项目研究的是爱丁堡大学数学荣誉课程拟议改革方案下的排课可行性。借助 Google OR-Tools，我参与构建了一个大规模 CP-SAT 模型，用来同时刻画课程安排、学生选课结构、双学位学生校外固定课表，以及一系列课表质量规则。项目中的一个关键建模思想是学生类型聚合：我们不是逐个建模每位学生，而是将具有相同项目结构和外部课表的学生分组，从而在保留问题核心组合结构的同时减少模型规模。随后，我们设计并比较了多个情景变体，以分析午休规则、早上9点限制、紧凑性要求以及连续讲座约束如何影响可行性。最终结果表明，在合适的规则集合下，可以在大规模条件下实现零冲突课表；而过于严格的讲座块约束则会对联合培养项目学生造成不成比例的负面影响。这个项目是我在优化、数学建模和大规模计算实验方面最有代表性的成果之一。"
selected = true
tags = ["运筹优化", "优化", "约束规划", "CP-SAT", "OR-Tools", "排课", "数学建模", "组合优化", "调度", "团队负责人"]
links = [
    { name = "报告", url = "/projects/TAOR_Final_Project.pdf" }
]

[[items]]
title = "基于随机游走的图神经网络"
subtitle = "暑期科研项目"
date = "2025年夏季"
content = "这个暑期研究项目聚焦于图神经网络中的表达能力问题。从标准消息传递型 GNN 的两个主要局限——过平滑和过压缩——出发，项目探索基于随机游走的方法是否能够提供更丰富的表示以及更灵活的图建模方式。我的工作包括梳理标准 GNN 架构（如图卷积网络和图注意力网络）的机制与局限，研究已有的随机游走方法，并进一步考察具有理论动机的随机游走方案能否带来性能提升。项目还将讨论扩展到超图情形，因为普通图结构本身无法自然刻画高阶关系。我认为这是一个非常有代表性的项目，因为它将图论、机器学习、表示学习和理论分析结合在一起，也很好地体现了我对偏数学取向机器学习的广泛兴趣。"
tags = ["机器学习", "图神经网络", "图论", "随机游走", "表示学习", "表达能力", "超图", "暑期科研", "研究项目", "数学机器学习"]

[[items]]
title = "英国冬季峰值电力需求的定量建模"
subtitle = "统计建模项目 · 团队负责人"
date = "2025年4月–5月"
content = "在这个项目中，我带领团队使用 1991 年至 2014 年的历史数据，为英国冬季峰值电力需求建立统计模型。该模型采用多因素线性回归框架，纳入可再生能源发电、季节效应和工作日结构，以同时提升可解释性与预测性能，其更广泛的目标是在严寒冬季条件下估计备用容量需求。除了回归模型本身，我还构建了一个基于五折交叉验证并结合 AIC/BIC 比较的自动化模型选择流程，使模型验证更加系统，也显著提高了效率。这个项目非常适合放在个人网站上，因为它展示了我处理真实数据、设计可解释统计模型，以及将建模、验证和分析整合进统一工作流程的能力。"
selected = true
tags = ["统计建模", "回归分析", "预测", "能源系统", "电力需求", "交叉验证", "AIC/BIC", "数据分析", "应用统计", "团队负责人"]
