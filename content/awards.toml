]

[[items]]
title = "William and Isabella Dick Prize"
subtitle = "University of Edinburgh"
date = "2024"
selected = true
content = "Awarded for outstanding performance in second-year Mathematics. The University of Edinburgh describes this prize as one or more awards made annually to the best current student(s) in second-year Mathematics. Receiving this prize recognised the consistency and strength of my performance across the full second-year curriculum. Official information can be found [here](https://registryservices.ed.ac.uk/student-funding/current-students/university-prizes-awards/science-engineering/mathematics)."
