[[items]]
title = "United Kingdom Best Pairs Entry"
subtitle = "Simon Marais Mathematics Competition"
date = "2025"
selected = true
content = "Together with Kevin Zhao, achieved the highest-scoring pairs entry from the United Kingdom in the West Division of the 2025 Simon Marais Mathematics Competition, with a score of 21. The official results list our pair as the United Kingdom's Best pairs entry by country. This distinction is especially meaningful to me because the competition emphasises creative, proof-based mathematical problem solving at university level rather than routine computation alone. Results can be found [here](https://www.simonmarais.org/west-division.html)."
tags = ["Award", "Mathematics Competition", "Simon Marais Mathematics Competition", "United Kingdom Best Pairs Entry", "International Competition", "Problem Solving", "Proof-Based Mathematics", "University of Edinburgh"]
links = [
    { name = "Results", url = "https://www.simonmarais.org/west-division.html" }
]

