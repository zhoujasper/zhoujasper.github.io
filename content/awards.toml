[[items]]
title = "School of Mathematics Vacation Scholarship"
subtitle = "University of Edinburgh"
date = "2024"
selected = true
content = "Awarded summer research funding through the School of Mathematics Vacation Scholarship scheme. This scheme supports supervised vacation research projects in mathematics; the current School description states that scholarships are typically funded for six weeks at £300 per week, with awards based on academic performance. Receiving this scholarship gave me the opportunity to carry out an early research project in mathematics in a more independent and exploratory setting. Information about Mathematics scholarships and prizes can be found [here](https://registryservices.ed.ac.uk/student-funding/current-students/university-prizes-awards/science-engineering/mathematics), and details on School of Mathematics vacation scholarships can be found [here](https://teaching.maths.ed.ac.uk/undergraduate/opportunities/vacation-scholarships/funding)."
tags = ["Award", "Scholarship", "Vacation Scholarship", "Summer Research", "Research Funding", "University of Edinburgh", "School of Mathematics", "Undergraduate Research"]
