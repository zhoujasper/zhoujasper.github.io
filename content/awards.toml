[[items]]
title = "Top 25% Worldwide in Euclid Mathematics Contest"
subtitle = "Euclid Mathematics Contest"
date = "2023"
content = "Placed in the top 25% worldwide in the Euclid Mathematics Contest, which corresponds to a Certificate of Distinction under the official award structure of the contest. Organised by the Centre for Education in Mathematics and Computing at the University of Waterloo, the Euclid Contest is one of the best-known international pre-university mathematics competitions and places strong emphasis on rigorous written solutions as well as problem-solving ability. Official contest information can be found [here](https://cemc.uwaterloo.ca/contests/euclid)."
