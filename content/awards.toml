[[items]]
title = "Kelland Memorial Prize"
subtitle = "University of Edinburgh"
date = "2024"
selected = true
content = "Awarded the Kelland Memorial Prize for distinguished performance as a direct entrant into second-year Mathematics. According to the University of Edinburgh prize description, this prize is awarded annually on the recommendation of the Board of Examiners to a student entering directly into the second year, making it a particularly meaningful recognition of my academic transition into the degree programme. Official information can be found [here](https://registryservices.ed.ac.uk/student-funding/current-students/university-prizes-awards/science-engineering/mathematics)."
