[[items]]
title = "Random-Walk-Based Graph Neural Networks"
subtitle = "Vacation Research Project"
date = "Summer 2025"
content = "This summer research project focuses on expressivity in graph neural networks. Starting from two major limitations of standard message-passing GNNs—oversmoothing and oversquashing—the project explores whether random-walk-based approaches can provide richer representations and more flexible graph modelling. My work includes reviewing the mechanisms and limitations of standard GNN architectures such as graph convolutional and graph attention networks, studying existing random-walk-based methods, and investigating theoretically motivated random walk schemes for improved performance. The project also extends the discussion to hypergraphs, where higher-order relationships cannot be naturally captured by ordinary graph structures alone. I see this as a particularly representative project because it connects graph theory, machine learning, representation learning, and theoretical analysis in a way that matches my broader interest in mathematically oriented machine learning."
tags = ["Machine Learning", "Graph Neural Networks", "Graph Theory", "Random Walks", "Representation Learning", "Expressivity", "Hypergraphs", "Summer Research", "Research Project", "Mathematical ML"]

[[items]]
title = "Quantitative Modelling of Winter Peak Electricity Demand in Great Britain"
subtitle = "Statistical Modelling Project · Team Leader"
date = "Apr–May 2025"
content = "In this project, I led a team in building a statistical model for winter peak electricity demand in Great Britain using historical data from 1991 to 2014. The model uses a multi-factor linear regression framework that incorporates renewable generation, seasonal effects, and weekday structure in order to improve both interpretability and predictive performance, with the broader goal of estimating reserve-capacity needs under severe winter conditions. Beyond the regression model itself, I also built an automated model-selection workflow based on five-fold cross-validation together with AIC/BIC comparisons, which made validation more systematic and significantly improved efficiency. This project is well suited for a personal website because it shows that I can work with real data, design interpretable statistical models, and integrate modelling, validation, and analysis into one coherent workflow."
