title = "Approximation by Rationals"
subtitle = "Year 4 Group Project · University of Edinburgh (Supervisor: Professor Jim Wright)"
date = "2025–2026"
content = "This is my final-year pure mathematics project on Diophantine approximation. The project is centred on a fundamental question: how well can real numbers be approximated by rationals? Building from that question, the report develops a structured account of continued fractions, Liouville’s theorem, Thue’s theorem, and their connections with Pell equations, binary homogeneous polynomials, and Dirichlet’s Unit Theorem. The project is primarily theoretical and expository in nature: it requires not only understanding individual results, but also organising them into a coherent mathematical narrative with clear logical progression. Among my projects, this one best represents my long-term interest in pure mathematics, especially number theory and adjacent algebraic topics."
