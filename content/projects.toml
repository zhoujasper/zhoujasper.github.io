[[items]]
title = "Constraint Programming for Mathematics Timetabling"
subtitle = "TAOR Final Project · University of Edinburgh · Team Leader"
date = "2026"
content = "This project investigates the timetable feasibility of a proposed redesign of the honours Mathematics curriculum at the University of Edinburgh. Using Google OR-Tools, I helped develop a large-scale CP-SAT model that jointly captures course scheduling, student choice structures, fixed outside-school timetables for joint-degree students, and a range of timetable-quality rules. A key modelling idea is student-type aggregation: instead of modelling every student individually, students with the same programme structure and external timetable are grouped together to reduce model size while preserving the essential combinatorial structure of the problem. We then designed and compared multiple scenario variants to analyse how lunch-break rules, 9am restrictions, compactness requirements, and consecutive-lecture constraints affect feasibility. The final results show that, under an appropriate rule set, a zero-conflict timetable can be achieved at scale, while overly restrictive lecture-block rules disproportionately harm joint-programme students. This project is one of the strongest examples of my work in optimisation, mathematical modelling, and large-scale computational experimentation."
selected = true
tags = ["Operations Research", "Optimisation", "Constraint Programming", "CP-SAT", "OR-Tools", "Timetabling", "Mathematical Modelling", "Combinatorial Optimisation", "Scheduling", "Team Leadership"]
