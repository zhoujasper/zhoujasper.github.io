[[items]]
title = "Multi-Stage Laptop Manufacturing System Simulation Study"
subtitle = "Manufacturing System Simulation Project · Team Leader"
date = "Apr 2026"
content = "This project develops a Simul8 discrete-event simulation of a multi-stage laptop manufacturing system. We first carried out input analysis on interarrival times and multiple processing-time datasets, using AIC, BIC, KS testing, and maximum likelihood estimation to select appropriate probability models. We then embedded mechanisms such as blocking, rework, inventory control, component matching, and order-level synchronisation into a full simulation framework. The baseline model revealed poor system performance, with an average cycle time of about 1575 minutes and the case-manufacturing line identified as the main bottleneck. Based on these findings, we designed a sequence of progressive improvement experiments that exposed layered bottlenecks in aluminium supply, hard-disk availability, and workbench capacity. The final improved model reduced average cycle time to about 1242 minutes, increased throughput from 2.82 to 7.14 laptops per hour, and significantly lowered the rejection rate. This project is a strong example of my work in input modelling, system diagnosis, experimental simulation, and operational interpretation."
tags = ["Simulation", "Discrete-Event Simulation", "Simul8", "Manufacturing Systems", "Input Modelling", "Bottleneck Analysis", "AIC/BIC", "MLE", "Operations Research", "Team Leadership"]
links = [
    { name = "Report", url = "/projects/Multi-Stage_Laptop_Manufacturing_System_Simulation.pdf" }
]