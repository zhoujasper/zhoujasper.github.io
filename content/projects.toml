[[items]]
title = "BoxCar Ride-Sharing Simulation Study"
subtitle = "Data-Driven Discrete-Event Simulation Project · Team Leader"
date = "Feb 2026"
content = "This project studies the operational performance of a ride-sharing system through a data-driven discrete-event simulation. Together with a teammate, I built a model that captures rider arrivals, driver availability, distance-based matching, trip execution, and the associated revenue and cost structure. We first examined whether the parameter values given in the project brief were statistically consistent with the observed data, and found that the default configuration drives the system close to saturation, producing longer waiting times, higher cancellation rates, and weaker net revenue. We then re-estimated the key parameters using maximum likelihood methods and compared the adjusted baseline with the original setting. Finally, we designed several scenarios to analyse trade-offs between rider service quality, driver earnings, profitability, and system balance. A central conclusion of the project is that simply oversupplying drivers is not the most robust way to improve service; better matching efficiency and reduced empty miles are often more sustainable operational improvements."
selected = true
