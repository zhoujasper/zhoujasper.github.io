[[items]]
title = "Strategic Workforce Allocation Optimization"
subtitle = "Optimisation Modelling Project · Team Leader"
date = "Apr 2025"
content = "This project considers a multi-project workforce allocation problem for a consulting firm. The goal is to allocate consultants across projects, locations, and consultant levels while respecting role restrictions, travel costs, bench policies, and other business rules, and at the same time maximise total profit. I used Xpress to formulate and solve a linear/integer optimisation model for 13 projects across multiple regions, and then extended the analysis to more realistic strategic scenarios involving demand variability, remote-work penalties, outsourcing costs, and Irish transport disruption. The results show, for example, that moderate use of remote work can significantly reduce travel costs, while the marginal gains flatten once remote capacity reaches roughly 15% of project demand. The project also highlights how heavy dependence on cross-regional deployment weakens resilience under disruption. Overall, this is a good applied-optimisation project that demonstrates how mathematical programming can support real managerial decisions."
tags = ["Optimisation", "Mathematical Programming", "MILP", "Xpress", "Workforce Planning", "Resource Allocation", "Scenario Analysis", "Operations Research", "Decision Modelling", "Team Leadership"]
